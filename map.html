<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공항 기상 현황 지도</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background: #f0f4f8; }

    #hd {
      position: fixed; top: 0; left: 0; right: 0; height: 46px;
      background: #1b3a6b; color: #fff;
      display: flex; align-items: center; padding: 0 14px; gap: 8px; z-index: 1000;
      box-shadow: 0 2px 6px rgba(0,0,0,0.35);
    }
    #hd h1 { font-size: 14px; font-weight: 600; letter-spacing: .3px; }
    .hd-btn {
      background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.25);
      color: #fff; padding: 3px 10px; border-radius: 4px; cursor: pointer;
      font-size: 12px; font-family: inherit; flex-shrink: 0;
    }
    .hd-btn:hover { background: rgba(255,255,255,.28); }
    #hd-time { margin-left: auto; font-size: 11px; opacity: .65; white-space: nowrap; }

    #map { position: absolute; top: 46px; left: 0; right: 0; bottom: 0; }

    /* ── 마커 공통 ── */
    .apm {
      background: #fff;
      border: 2px solid #1b3a6b;
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,.22);
      cursor: pointer;
      white-space: nowrap;
      transition: transform .12s, box-shadow .12s;
      position: relative;
    }
    .apm:hover { transform: scale(1.07); box-shadow: 0 4px 14px rgba(0,0,0,.3); }
    .apm.rain  { border-color: #1565c0; background: #e3f2fd; }
    .apm.snow  { border-color: #7b1fa2; background: #f3e5f5; }

    /* 특보 배지 */
    .apm-warn-badge {
      position: absolute; top: -6px; right: -6px;
      background: #c62828; color: #fff;
      font-size: 8px; font-weight: 700; line-height: 1;
      padding: 2px 3px; border-radius: 4px;
      border: 1px solid #fff;
      pointer-events: none;
    }

    /* 풀사이즈 (zoom ≥ 9) */
    .apm-full  { padding: 4px 7px 3px; }
    .apm-full .apm-icon { font-size: 20px; line-height: 1.15; }
    .apm-full .apm-tmp  { font-size: 13px; font-weight: 700; }
    .apm-full .apm-name { font-size: 10px; color: #555; margin-top: 1px; }

    /* 중간 (zoom 7-8): 이름 숨김 */
    .apm-mid  { padding: 3px 6px 2px; }
    .apm-mid .apm-icon { font-size: 16px; line-height: 1.1; }
    .apm-mid .apm-tmp  { font-size: 11px; font-weight: 700; }
    .apm-mid .apm-name { display: none; }

    /* 미니 (zoom ≤ 6): 이모지만 */
    .apm-mini { padding: 2px 4px; border-radius: 6px; }
    .apm-mini .apm-icon { font-size: 13px; line-height: 1; }
    .apm-mini .apm-tmp  { display: none; }
    .apm-mini .apm-name { display: none; }

    .apm-load { font-size: 18px; opacity: .4; }

    /* ── 팝업 ── */
    .leaflet-popup-content-wrapper { border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,.2); }
    .leaflet-popup-content { font-family: 'Malgun Gothic', sans-serif; margin: 12px 14px; min-width: 172px; }
    .pp-head {
      font-size: 14px; font-weight: 700; color: #1b3a6b;
      border-bottom: 1px solid #e0e6f0; padding-bottom: 7px; margin-bottom: 8px;
      display: flex; align-items: center; gap: 5px; flex-wrap: wrap;
    }
    .pp-code { font-size: 10px; color: #999; font-weight: 400; }
    .pp-warn-tag {
      font-size: 10px; font-weight: 700; color: #fff;
      background: #c62828; padding: 1px 5px; border-radius: 3px; margin-left: auto;
    }
    .pp-row  { display: flex; justify-content: space-between; font-size: 12px; margin: 4px 0; }
    .pp-lbl  { color: #888; }
    .pp-val  { font-weight: 600; color: #222; }
    .pp-go {
      display: block; margin-top: 11px; text-align: center;
      background: #1b3a6b; color: #fff; padding: 6px;
      border-radius: 6px; text-decoration: none; font-size: 12px;
      transition: background .15s;
    }
    .pp-go:hover { background: #2a5298; }

    /* ── 로딩 ── */
    #overlay {
      position: fixed; top: 46px; left: 0; right: 0; bottom: 0;
      background: rgba(240,244,248,.72); backdrop-filter: blur(2px);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 800; gap: 10px;
    }
    #overlay p { font-size: 13px; color: #445; }
    .spinner {
      width: 34px; height: 34px; border: 3px solid #cbd5e1;
      border-top-color: #1b3a6b; border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 범례 ── */
    #legend {
      position: fixed; bottom: 16px; left: 12px; z-index: 900;
      background: rgba(255,255,255,.92); border: 1px solid #dde3ed;
      border-radius: 8px; padding: 8px 12px; font-size: 11px; color: #445;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
    }
    #legend b { display: block; margin-bottom: 4px; color: #1b3a6b; font-size: 11px; }
    .leg-row { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
    .leg-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid; flex-shrink: 0; }
    .leg-badge { background:#c62828; color:#fff; font-size:9px; font-weight:700; padding:1px 3px; border-radius:3px; }
  </style>
</head>
<body>

<div id="hd">
  <button class="hd-btn" onclick="history.back()">← 뒤로</button>
  <h1>✈ 전국 공항 기상 현황</h1>
  <button class="hd-btn" id="refresh-btn" onclick="doRefresh()">↺ 새로고침</button>
  <span id="hd-time"></span>
</div>

<div id="map"></div>

<div id="overlay">
  <div class="spinner"></div>
  <p id="overlay-msg">공항 기상 데이터 불러오는 중…</p>
</div>

<div id="legend">
  <b>범례</b>
  <div class="leg-row"><div class="leg-dot" style="border-color:#1b3a6b;background:#fff"></div> 맑음/흐림</div>
  <div class="leg-row"><div class="leg-dot" style="border-color:#1565c0;background:#e3f2fd"></div> 비/소나기</div>
  <div class="leg-row"><div class="leg-dot" style="border-color:#7b1fa2;background:#f3e5f5"></div> 눈</div>
  <div class="leg-row"><span class="leg-badge">특보</span> 특보 발효 중</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/apikey.js"></script>
<script src="js/config.js"></script>
<script src="js/data.js"></script>
<script>
(async function () {

  /* ── 지도 초기화 ── */
  const map = L.map('map', {
    center: [36.3, 127.9], zoom: 7,
    zoomControl: true,
  });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://osm.org/copyright">OpenStreetMap</a>',
    maxZoom: 14,
  }).addTo(map);

  /* ── 공항 위경도 ── */
  const COORDS = {
    GMP: [37.5583, 126.7943],
    CJU: [33.5113, 126.4929],
    PUS: [35.1795, 128.9382],
    TAE: [35.8942, 128.6588],
    CJJ: [36.7172, 127.4993],
    KWJ: [35.1264, 126.8088],
    RSU: [34.8423, 127.6168],
    MWX: [34.9913, 126.3826],
    KPO: [35.9879, 129.4199],
    KUV: [35.9038, 126.6159],
    WJU: [37.4380, 127.9595],
    HIN: [35.0886, 128.0706],
    YNY: [38.0613, 128.6694],
    USN: [35.5935, 129.3520],
  };

  /* ── 날씨 헬퍼 (data.js WX와 통일) ── */
  function wxEmoji(pty, sky) {
    if (pty === 7) return '🌨';
    if (pty === 6) return '🌨';
    if (pty === 5) return '🌦';
    if (pty === 4) return '🌦';
    if (pty === 3) return '❄️';
    if (pty === 2) return '🌨';
    if (pty === 1) return '🌧';
    if (sky === 4) return '☁️';
    if (sky === 3) return '⛅';
    return '☀️';
  }
  function wxLabel(pty, sky) {
    if (pty === 7) return '눈날림';
    if (pty === 6) return '빗방울/눈날림';
    if (pty === 5) return '빗방울';
    if (pty === 4) return '소나기';
    if (pty === 3) return '눈';
    if (pty === 2) return '비/눈';
    if (pty === 1) return '비';
    if (sky === 4) return '흐림';
    if (sky === 3) return '구름많음';
    return '맑음';
  }
  function markerClass(pty) {
    if (pty === 3 || pty === 7 || pty === 6) return ' snow';
    if (pty >= 1) return ' rain';
    return '';
  }
  function tmpColor(t) {
    if (t >= 35) return '#c62828';
    if (t >= 30) return '#e65100';
    if (t <=  0) return '#1565c0';
    return '#1b3a6b';
  }

  /* ── 특보 wrnKeys 매칭 (AND 조건 배열 지원, 해상특보 제외) ── */
  const MARITIME_TITLES = ['풍랑', '해일', '지진해일'];
  function aptHasWarning(apt, warnList) {
    if (!warnList || !warnList.length) return false;
    var keys = (apt.wrnKeys && apt.wrnKeys.length) ? apt.wrnKeys : [apt.wrnCity || ''];
    return warnList.some(function(w) {
      var title = w.wrnTitle || '';
      if (MARITIME_TITLES.some(function(t) { return title.includes(t); })) return false;
      var region = [w.t6, w.t2, w.area, w.areaFc].filter(Boolean).join(' ');
      return keys.some(function(kw) {
        if (Array.isArray(kw)) return kw.every(function(k) { return k && region.includes(k); });
        return kw && region.includes(kw);
      });
    });
  }

  /* ── 줌 레벨 → 마커 크기 ── */
  function sizeClass(zoom) {
    if (zoom >= 9) return 'apm-full';
    if (zoom >= 7) return 'apm-mid';
    return 'apm-mini';
  }
  function iconSize(zoom) {
    if (zoom >= 9) return [66, 70];
    if (zoom >= 7) return [50, 52];
    return [36, 36];
  }

  /* ── 마커 HTML ── */
  function iconHtml(apt, wx, zoom, hasWarn) {
    const sc    = sizeClass(zoom);
    const badge = hasWarn ? '<span class="apm-warn-badge">특보</span>' : '';
    if (!wx) {
      return `<div class="apm ${sc}">${badge}<div class="apm-load">✈</div><div class="apm-name">${apt.name}</div></div>`;
    }
    const pty = wx.PTY || 0, sky = wx.SKY || 1;
    const tmp = wx.T1H !== undefined ? Math.round(wx.T1H) : null;
    const cls = markerClass(pty);
    const col = tmp !== null ? tmpColor(tmp) : '#1b3a6b';
    return `<div class="apm ${sc}${cls}">
      ${badge}
      <div class="apm-icon">${wxEmoji(pty, sky)}</div>
      <div class="apm-tmp" style="color:${col}">${tmp !== null ? tmp + '°' : '-'}</div>
      <div class="apm-name">${apt.name}</div>
    </div>`;
  }

  /* ── 팝업 HTML ── */
  function popupHtml(apt, wx, hasWarn, warnList) {
    const pty  = wx?.PTY || 0, sky = wx?.SKY || 1;
    const tmp  = wx?.T1H  !== undefined ? Math.round(wx.T1H)  + '°C' : '-';
    const wsd  = wx?.WSD  !== undefined ? wx.WSD + ' m/s' : '-';
    const reh  = wx?.REH  !== undefined ? wx.REH + '%' : '-';
    const rn1  = wx?.RN1  && wx.RN1 !== '강수없음' ? wx.RN1 : '-';
    const cond = wxLabel(pty, sky);

    // 이 공항에 해당하는 특보 제목 추출
    let warnTag = '';
    if (hasWarn && warnList) {
      var keys = (apt.wrnKeys && apt.wrnKeys.length) ? apt.wrnKeys : [apt.wrnCity || ''];
      var matched = warnList.filter(function(w) {
        var title = w.wrnTitle || '';
        if (MARITIME_TITLES.some(function(t) { return title.includes(t); })) return false;
        var region = [w.t6, w.t2, w.area, w.areaFc].filter(Boolean).join(' ');
        return keys.some(function(kw) {
          if (Array.isArray(kw)) return kw.every(function(k) { return k && region.includes(k); });
          return kw && region.includes(kw);
        });
      });
      if (matched.length) {
        var titles = [...new Set(matched.map(w => w.wrnTitle || '').filter(Boolean))];
        warnTag = `<span class="pp-warn-tag">${titles.slice(0, 2).join(', ')}</span>`;
      }
    }

    return `
      <div class="pp-head">${wxEmoji(pty, sky)} ${apt.name}공항 <span class="pp-code">${apt.code}</span>${warnTag}</div>
      <div class="pp-row"><span class="pp-lbl">날씨</span><span class="pp-val">${cond}</span></div>
      <div class="pp-row"><span class="pp-lbl">기온</span><span class="pp-val">${tmp}</span></div>
      <div class="pp-row"><span class="pp-lbl">풍속</span><span class="pp-val">${wsd}</span></div>
      <div class="pp-row"><span class="pp-lbl">습도</span><span class="pp-val">${reh}</span></div>
      <div class="pp-row"><span class="pp-lbl">강수량</span><span class="pp-val">${rn1}</span></div>
      <a class="pp-go" href="index.html?apt=${apt.code}">상세 기상정보 →</a>`;
  }

  /* ── 초단기예보 fetch ── */
  async function fetchNcst(nx, ny, key) {
    const now = new Date();
    if (now.getMinutes() < 30) now.setHours(now.getHours() - 1);
    const p = n => String(n).padStart(2, '0');
    const base_date = now.getFullYear() + p(now.getMonth()+1) + p(now.getDate());
    const base_time = p(now.getHours()) + '30';

    const url = new URL('https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getUltraSrtFcst');
    url.searchParams.set('serviceKey', key);
    url.searchParams.set('pageNo',     '1');
    url.searchParams.set('numOfRows',  '60');
    url.searchParams.set('dataType',   'JSON');
    url.searchParams.set('base_date',  base_date);
    url.searchParams.set('base_time',  base_time);
    url.searchParams.set('nx', nx);
    url.searchParams.set('ny', ny);

    const res = await fetch(url.toString());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (json?.response?.header?.resultCode !== '00') return null;
    const items = json?.response?.body?.items?.item;
    if (!items) return null;
    const arr = Array.isArray(items) ? items : [items];
    const nearestTime = [...new Set(arr.map(i => i.fcstTime))].sort()[0];
    const obj = {};
    arr.filter(i => i.fcstTime === nearestTime).forEach(i => {
      const val = isNaN(i.fcstValue) ? i.fcstValue : parseFloat(i.fcstValue);
      if (val !== -999) obj[i.category] = val;
    });
    return obj;
  }

  /* ── 기상특보 전국 목록 fetch ── */
  async function fetchAllWarnings(key) {
    try {
      const url = new URL('https://apis.data.go.kr/1360000/WthrWrnInfoService/getWthrWrnMsg');
      url.searchParams.set('serviceKey', key);
      url.searchParams.set('pageNo',    '1');
      url.searchParams.set('numOfRows', '100');
      url.searchParams.set('dataType',  'JSON');
      const res = await fetch(url.toString());
      if (!res.ok) return [];
      const json = await res.json();
      if (json?.response?.header?.resultCode !== '00') return [];
      const items = json?.response?.body?.items?.item;
      if (!items) return [];
      return Array.isArray(items) ? items : [items];
    } catch(e) { return []; }
  }

  /* ── 마커 아이콘 팩토리 ── */
  await CONFIG.ready;
  const key = CONFIG.API_KEY.includes('%') ? decodeURIComponent(CONFIG.API_KEY) : CONFIG.API_KEY;

  function mkIcon(html, zoom) {
    const [w, h] = iconSize(zoom);
    return L.divIcon({ html, className: '', iconSize: [w, h], iconAnchor: [w/2, h/2], popupAnchor: [0, -h/2-4] });
  }

  /* ── 마커 초기 생성 ── */
  const entries = {};
  AIRPORTS.forEach(apt => {
    const coords = COORDS[apt.code];
    if (!coords) return;
    const zoom   = map.getZoom();
    const marker = L.marker(coords, { icon: mkIcon(iconHtml(apt, null, zoom, false), zoom) }).addTo(map);
    marker.bindPopup('', { maxWidth: 230 });
    marker.on('click', () => {
      const pp = entries[apt.code]?.pp || '<div style="padding:8px;color:#888;font-size:12px;">로딩 중…</div>';
      marker.getPopup().setContent(pp).openOn(map);
    });
    entries[apt.code] = { apt, marker, pp: null, wx: null, hasWarn: false };
  });

  /* ── 데이터 로드 함수 (초기 + 자동갱신 공용) ── */
  let _refreshTimer = null;
  let _warnList     = [];

  async function loadAll(showOverlay) {
    if (showOverlay) {
      document.getElementById('overlay').style.display = 'flex';
      document.getElementById('overlay-msg').textContent = '공항 기상 데이터 불러오는 중…';
    }
    const btn = document.getElementById('refresh-btn');
    if (btn) btn.disabled = true;

    try {
      // 특보 + 전체 공항 날씨 병렬 fetch
      const [warnResult, ...wxResults] = await Promise.allSettled([
        fetchAllWarnings(key),
        ...AIRPORTS.filter(a => COORDS[a.code]).map(apt =>
          fetchNcst(apt.nx, apt.ny, key)
            .then(wx => ({ code: apt.code, wx }))
            .catch(() => ({ code: apt.code, wx: null }))
        ),
      ]);

      _warnList = warnResult.status === 'fulfilled' ? warnResult.value : [];

      const zoom = map.getZoom();
      wxResults.forEach(r => {
        if (r.status !== 'fulfilled') return;
        const { code, wx } = r.value;
        const e = entries[code];
        if (!e) return;
        e.wx      = wx;
        e.hasWarn = aptHasWarning(e.apt, _warnList);
        e.marker.setIcon(mkIcon(iconHtml(e.apt, wx, zoom, e.hasWarn), zoom));
        e.pp = popupHtml(e.apt, wx, e.hasWarn, _warnList);
      });

      updateTime();
    } finally {
      document.getElementById('overlay').style.display = 'none';
      if (btn) btn.disabled = false;
      // 30분 후 자동갱신
      clearTimeout(_refreshTimer);
      _refreshTimer = setTimeout(() => loadAll(false), 30 * 60 * 1000);
    }
  }

  /* ── 새로고침 버튼 핸들러 ── */
  window.doRefresh = function() { loadAll(true); };

  /* ── 초기 로드 ── */
  await loadAll(true);

  /* ── 줌 변경 시 마커 크기 업데이트 ── */
  map.on('zoomend', () => {
    const zoom = map.getZoom();
    Object.values(entries).forEach(e => {
      e.marker.setIcon(mkIcon(iconHtml(e.apt, e.wx, zoom, e.hasWarn), zoom));
    });
  });

  /* ── 현재 시각 표시 (1분마다 갱신) ── */
  function updateTime() {
    const now = new Date();
    const p   = n => String(n).padStart(2, '0');
    document.getElementById('hd-time').textContent =
      `기준: ${now.getMonth()+1}/${now.getDate()} ${p(now.getHours())}:${p(now.getMinutes())}`;
  }
  setInterval(updateTime, 60 * 1000);

  /* ── URL 파라미터로 공항 자동 선택 ── */
  const params    = new URLSearchParams(location.search);
  const focusCode = params.get('apt');
  if (focusCode && entries[focusCode]) {
    const e = entries[focusCode];
    map.setView(e.marker.getLatLng(), 10);
    setTimeout(() => e.marker.openPopup(), 400);
  }

})();
</script>
</body>
</html>
